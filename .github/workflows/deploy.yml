name: Deploy

on:
  push:
    branches:
      - main

jobs:
  development:
    runs-on: ubuntu-latest

    environment:
      name: development

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Development
        run: echo "Deploying to Development..."

  production:
    runs-on: ubuntu-latest

    needs: development

    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Production
        run: echo "Deploying to Production..."