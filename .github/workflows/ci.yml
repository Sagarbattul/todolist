name: Next.js CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

  type-check:
    runs-on: ubuntu-latest

    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run type-check

  build:
    runs-on: ubuntu-latest

    environment:
      name: development

    needs:
      - lint
      - type-check

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
  production:
    runs-on: ubuntu-latest

    needs: build

    environment:
      name: production

    steps:
      - name: Production Deployment
        run: echo "Deploying to Production..."    